server:
  port: ${SERVER_PORT:9091}

spring:
  application:
    name: aiylBank
  profiles:
    active: ${PROFILE:dev}

  flyway:
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

  info:
    title: AiylBank API
    description: API для управления банковскими счетами и транзакциями
    version: 1.0.0

